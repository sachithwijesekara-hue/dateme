<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>An Evening Together? 🌆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{
    --blush:#ffe3ea;
    --cream:#fff7f3;
    --rose:#ff4d6d;
    --rose-deep:#c9184a;
    --wine:#590d22;
    --gold:#d4af37;
    --soft:#ffc2d1;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(160deg,var(--blush) 0%, var(--cream) 55%, var(--soft) 100%);
    min-height:100vh;
    overflow-x:hidden;
    color:var(--wine);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  h1,h2{font-family:'Playfair Display',serif;}

  #heartsCanvas{
    position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none;
  }

  .app{
    position:relative;
    z-index:2;
    width:100%;
    max-width:480px;
  }

  .screen{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:28px;
    padding:38px 26px;
    box-shadow:0 20px 60px rgba(89,13,34,0.18);
    animation:floatIn .6s ease;
  }
  .screen.active{display:flex;}

  @keyframes floatIn{
    from{opacity:0; transform:translateY(24px) scale(.97);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }

  .icon-top{
    font-size:2.6rem;
    color:var(--rose);
    margin-bottom:14px;
  }
  .pulse{animation:pulseHeart 1.4s ease-in-out infinite;}
  @keyframes pulseHeart{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.18);}
  }

  h1.title{font-size:1.7rem; color:var(--rose-deep); margin-bottom:6px; font-weight:700;}
  h2.subtitle{font-size:1.25rem; font-weight:500; margin-bottom:20px; line-height:1.4;}
  p.note{font-size:.92rem; color:#8a4a5a; margin-bottom:18px; line-height:1.5;}

  /* Inputs */
  .input-wrap{width:100%; margin-bottom:14px; position:relative;}
  input[type="email"]{
    width:100%;
    padding:14px 16px 14px 44px;
    border-radius:16px;
    border:2px solid var(--soft);
    background:#fff;
    font-size:1rem;
    font-family:'Poppins',sans-serif;
    color:var(--wine);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input[type="email"]:focus{
    border-color:var(--rose);
    box-shadow:0 0 0 4px rgba(255,77,109,0.15);
  }
  .input-wrap i{
    position:absolute; left:15px; top:50%; transform:translateY(-50%);
    color:var(--rose); font-size:1.1rem;
  }
  .error-msg{
    color:var(--rose-deep);
    font-size:.85rem;
    min-height:18px;
    margin:-4px 0 10px 4px;
    align-self:flex-start;
  }

  /* Buttons */
  .btn{
    border:none;
    border-radius:50px;
    padding:14px 28px;
    font-family:'Poppins',sans-serif;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    color:#fff;
    box-shadow:0 10px 24px rgba(201,24,74,0.35);
    width:100%;
    justify-content:center;
  }
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-primary:disabled{
    opacity:.45; cursor:not-allowed; transform:none; box-shadow:none;
  }

  .btn-row{
    display:flex;
    gap:18px;
    justify-content:center;
    position:relative;
    width:100%;
    min-height:64px;
    margin-top:6px;
  }
  .btn-yes{
    background:linear-gradient(135deg,#ff7096,var(--rose-deep));
    color:#fff;
    font-size:1.08rem;
    padding:15px 34px;
    box-shadow:0 10px 26px rgba(201,24,74,0.4);
  }
  .btn-no{
    background:#fff;
    color:var(--wine);
    border:2px solid var(--soft);
    position:relative;
  }
  #noWrap{position:relative;}

  .hint{font-size:.8rem; color:#a36; margin-top:14px; opacity:.8;}

  /* Places grid */
  .places-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    width:100%;
    margin-bottom:18px;
  }
  .place-card{
    background:#fff;
    border:2px solid var(--soft);
    border-radius:18px;
    padding:16px 10px;
    cursor:pointer;
    transition:all .2s ease;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .place-card i{font-size:1.6rem; color:var(--rose);}
  .place-card span{font-size:.85rem; font-weight:500;}
  .place-card:hover{transform:translateY(-3px); border-color:var(--rose);}
  .place-card.selected{
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    border-color:var(--rose-deep);
  }
  .place-card.selected i, .place-card.selected span{color:#fff;}

  .choice-msg{
    min-height:24px;
    font-size:.95rem;
    font-weight:600;
    color:var(--rose-deep);
    margin-bottom:14px;
  }

  .location-block{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:4px 0 18px;
  }
  .location-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:600;
    font-size:.95rem;
    color:var(--rose-deep);
    margin-bottom:10px;
  }
  .location-input{
    width:100%;
    text-align:center;
    padding:15px 18px;
    border-radius:18px;
    border:2px solid var(--rose);
    background:#fff;
    font-size:1rem;
    font-family:'Poppins',sans-serif;
    color:var(--wine);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .location-input::placeholder{
    color:#c98;
    font-size:.92rem;
  }
  .location-input:focus{
    border-color:var(--rose-deep);
    box-shadow:0 0 0 5px rgba(255,77,109,0.18);
  }
  .location-hint{
    font-size:.78rem;
    color:#a36;
    margin-top:8px;
    opacity:.85;
  }

  /* Overlays for effects */
  .fx-layer{
    position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden;
  }
  .fx-piece{
    position:absolute; font-size:1.6rem; top:-40px; user-select:none;
  }

  footer.brand{
    margin-top:20px;
    font-size:.72rem;
    color:#b07;
    opacity:.6;
  }

  @media (max-width:380px){
    .screen{padding:30px 18px;}
    h1.title{font-size:1.45rem;}
    h2.subtitle{font-size:1.08rem;}
    .places-grid{grid-template-columns:1fr 1fr; gap:10px;}
  }
</style>
</head>
<body>

<canvas id="heartsCanvas"></canvas>
<div class="fx-layer" id="fxLayer"></div>

<div class="app">

  <!-- Step 1: The Ask -->
  <section class="screen active" id="askScreen">
    <i class="bi bi-heart-fill icon-top pulse"></i>
    <h1 class="title">Hey Malsha,</h1>
    <h2 class="subtitle">Will you go out with me this evening? 🌆</h2>
    <div class="btn-row">
      <button class="btn btn-yes" id="yesBtn"><i class="bi bi-emoji-heart-eyes-fill"></i> Yes</button>
      <div id="noWrap">
        <button class="btn btn-no" id="noBtn"><i class="bi bi-emoji-frown"></i> No</button>
      </div>
    </div>
    <p class="hint" id="askHint">psst... try clicking "No" 👀</p>
  </section>

  <!-- Step 2: Place selection -->
  <section class="screen" id="placeScreen">
    <i class="bi bi-stars icon-top"></i>
    <h1 class="title">Yay! Malsha said yes! 🎉</h1>
    <h2 class="subtitle" style="font-size:1.05rem;">Now, where should we go?</h2>
    <div class="places-grid" id="placesGrid">
      <div class="place-card" data-place="Coffee"><i class="bi bi-cup-hot-fill"></i><span>Coffee</span></div>
      <div class="place-card" data-place="Dinner"><i class="bi bi-egg-fried"></i><span>Dinner</span></div>
      <div class="place-card" data-place="Evening Chat"><i class="bi bi-chat-heart-fill"></i><span>Evening Chat</span></div>
      <div class="place-card" data-place="Just a Walk"><i class="bi bi-flower2"></i><span>Just a Walk</span></div>
      <div class="place-card" data-place="Drink"><i class="bi bi-cup-straw"></i><span>Drink</span></div>
      <div class="place-card" data-place="Movie"><i class="bi bi-film"></i><span>Movie</span></div>
    </div>
    <div class="location-block" id="locationWrap" style="display:none;">
      <div class="location-label"><i class="bi bi-geo-alt-fill"></i> Where exactly?</div>
      <input type="text" id="customPlace" class="location-input" placeholder="Type a location (optional)">
      <p class="location-hint">Leave blank and I'll decide ✨</p>
    </div>
    <div class="choice-msg" id="choiceMsg"></div>
    <button class="btn btn-primary" id="confirmBtn" disabled>Submit <i class="bi bi-send-heart-fill"></i></button>
  </section>

  <!-- Step 4: Done -->
  <section class="screen" id="doneScreen">
    <i class="bi bi-heart-fill icon-top pulse" id="doneIcon" style="color:#ff4d6d;"></i>
    <h1 class="title" id="doneTitle">Sending...</h1>
    <p class="note" id="doneNote">Hold tight, delivering your confirmation 💌</p>
  </section>

  <footer class="brand">made with <i class="bi bi-heart-fill"></i></footer>
</div>

<script>
/* ====== CONFIG (kept out of the visible UI) ====== */
const MY_EMAIL = "sachithwijesekara@gmail.com"; // never displayed on screen
const HER_NAME = "Malsha";
const HER_EMAIL = "maashidissanayake23@gmail.com"; // update with Malsha's real email
const herEmailValue = HER_EMAIL;

/* ====== Floating hearts background ====== */
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

let hearts = [];
function makeHeart(){
  return {
    x: Math.random()*canvas.width,
    y: canvas.height + 40 + Math.random()*200,
    size: 10 + Math.random()*18,
    speed: 0.4 + Math.random()*0.9,
    drift: (Math.random()-0.5)*0.6,
    opacity: 0.15 + Math.random()*0.35
  };
}
for(let i=0;i<22;i++) hearts.push(makeHeart());

function drawHeart(x,y,size,opacity){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(size/20, size/20);
  ctx.beginPath();
  ctx.moveTo(0,5);
  ctx.bezierCurveTo(0,-2,-10,-2,-10,6);
  ctx.bezierCurveTo(-10,14,0,18,0,22);
  ctx.bezierCurveTo(0,18,10,14,10,6);
  ctx.bezierCurveTo(10,-2,0,-2,0,5);
  ctx.fillStyle = `rgba(255,77,109,${opacity})`;
  ctx.fill();
  ctx.restore();
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hearts.forEach(h=>{
    h.y -= h.speed;
    h.x += h.drift;
    if(h.y < -30){ Object.assign(h, makeHeart(), {y: canvas.height+30}); }
    drawHeart(h.x,h.y,h.size,h.opacity);
  });
  requestAnimationFrame(loop);
}
loop();

/* ====== Screen navigation ====== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ====== Step 2: Yes / No ====== */
const noBtn = document.getElementById('noBtn');
const noWrap = document.getElementById('noWrap');
const askScreenEl = document.getElementById('askScreen');
const askHint = document.getElementById('askHint');
let dodgeCount = 0;
const maxDodge = 4;

function dodgeNo(){
  if(dodgeCount >= maxDodge) return;
  dodgeCount++;
  const rect = askScreenEl.getBoundingClientRect();
  const maxX = Math.max(0, rect.width - 130);
  const maxY = Math.max(0, rect.height - 220);
  const randX = (Math.random()*maxX) - (maxX/2);
  const randY = (Math.random()* (maxY*0.4));
  noWrap.style.transition = 'transform .25s ease';
  noWrap.style.transform = `translate(${randX}px, ${-randY}px)`;
  const hints = [
    "nope, try again 😏",
    "she's a bit shy, the button moved 😅",
    "okay okay, getting harder now 😂",
    "last chance to dodge... 💘"
  ];
  askHint.textContent = hints[Math.min(dodgeCount-1, hints.length-1)];
}
noBtn.addEventListener('mouseenter', dodgeNo);
noBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodgeNo(); }, {passive:false});

noBtn.addEventListener('click', ()=>{
  // only reachable after dodge limit, or quick click on slow devices
  sadFaceRain();
  askHint.textContent = "Aww... maybe ask again? 🥺";
});

const fxLayer = document.getElementById('fxLayer');
function spawnFx(symbols, count, duration){
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'fx-piece';
      el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      el.style.left = Math.random()*100 + 'vw';
      el.style.fontSize = (1.2 + Math.random()*1.6) + 'rem';
      el.style.animation = `fall ${duration + Math.random()*1.2}s linear forwards`;
      fxLayer.appendChild(el);
      setTimeout(()=> el.remove(), (duration+1.5)*1000);
    }, i*40);
  }
}
const fallKeyframes = `@keyframes fall{
  0%{ transform:translateY(-40px) rotate(0deg); opacity:1; }
  100%{ transform:translateY(110vh) rotate(360deg); opacity:0.2; }
}`;
const styleTag = document.createElement('style');
styleTag.textContent = fallKeyframes;
document.head.appendChild(styleTag);

function sadFaceRain(){ spawnFx(['😢','💔','😞'], 18, 3); }
function clapsAndConfetti(){
  spawnFx(['👏','🎉','💖','✨','💕'], 26, 2.6);
}

document.getElementById('yesBtn').addEventListener('click', ()=>{
  clapsAndConfetti();
  setTimeout(()=> showScreen('placeScreen'), 900);
});

/* ====== Step 2: Place selection ====== */
let chosenType = "";
let chosenLocation = "";
const choiceMsg = document.getElementById('choiceMsg');
const confirmBtn = document.getElementById('confirmBtn');
const locationWrap = document.getElementById('locationWrap');
const customPlaceInput = document.getElementById('customPlace');
const excellentLines = [
  "Excellent choice! 🌟",
  "Perfect pick! 😍",
  "Ooh, lovely choice! 💕",
  "Great taste! 🥂"
];
document.querySelectorAll('.place-card').forEach(card=>{
  card.addEventListener('click', ()=>{
    document.querySelectorAll('.place-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    chosenType = card.dataset.place;
    confirmBtn.disabled = false;
    choiceMsg.textContent = excellentLines[Math.floor(Math.random()*excellentLines.length)] + " — " + chosenType;

    if(locationWrap.style.display === 'none'){
      locationWrap.style.display = 'flex';
      locationWrap.style.animation = 'floatIn .4s ease';
      setTimeout(()=> customPlaceInput.focus(), 350);
    }
  });
});
customPlaceInput.addEventListener('input', ()=>{
  chosenLocation = customPlaceInput.value.trim();
});

/* ====== Step 3: Send confirmations (direct, no email app) ====== */
confirmBtn.addEventListener('click', ()=>{
  confirmBtn.disabled = true;
  confirmBtn.innerHTML = 'Sending... <i class="bi bi-arrow-repeat"></i>';

  const finalPlace = chosenLocation
    ? `${chosenType} — ${chosenLocation}`
    : `${chosenType} (location: surprise me, you decide! 🎁)`;

  const doneIcon = document.getElementById('doneIcon');
  const doneTitle = document.getElementById('doneTitle');
  const doneNote = document.getElementById('doneNote');

  showScreen('doneScreen');
  doneIcon.className = 'bi bi-heart-fill icon-top pulse';
  doneIcon.style.color = '#ff4d6d';
  doneTitle.textContent = 'Sending...';
  doneNote.textContent = 'Hold tight, delivering both confirmations 💌';

  // Email to ME: tells me she confirmed and what she picked
  const myPayload = {
    name: "Evening Date Confirmation",
    email: HER_EMAIL,
    _subject: `${HER_NAME} said YES! 🎉`,
    _template: "box",
    _captcha: "false",
    message:
      `Great news! ${HER_NAME} confirmed the evening date!\n\n` +
      `Place: ${finalPlace}\n\n` +
      `Get ready for an unforgettable evening!`
  };

  // Email to HER: congratulates her on getting a date
  const herPayload = {
    name: "Your Date Confirmation",
    email: MY_EMAIL,
    _subject: "Congratulations, you got a date! 💕",
    _template: "box",
    _captcha: "false",
    message:
      `Hi ${HER_NAME},\n\n` +
      `Congratulations — you've got a date this evening! 🎉\n\n` +
      `Where: ${finalPlace}\n\n` +
      `Get ready for a wonderful evening!`
  };

  const sendMy = fetch(`https://formsubmit.co/ajax/${encodeURIComponent(MY_EMAIL)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(myPayload)
  });

  const sendHer = fetch(`https://formsubmit.co/ajax/${encodeURIComponent(HER_EMAIL)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(herPayload)
  });

  Promise.all([sendMy, sendHer])
  .then(() => {
    doneIcon.className = 'bi bi-check-circle-fill icon-top';
    doneIcon.style.color = '#2ecc71';
    doneTitle.textContent = "It's a date! 💌";
    doneNote.textContent = '';
    clapsAndConfetti();
  })
  .catch(err => {
    doneIcon.className = 'bi bi-exclamation-triangle-fill icon-top';
    doneIcon.style.color = '#e0a800';
    doneTitle.textContent = "Almost there...";
    doneNote.textContent = "Couldn't reach the mail server. Check your connection and try again.";
    confirmBtn.disabled = false;
    confirmBtn.innerHTML = 'Submit <i class="bi bi-send-heart-fill"></i>';
    showScreen('placeScreen');
  });
});
</script>
</body>
</html>
